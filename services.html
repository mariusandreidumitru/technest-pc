    <!-- ===== THEME TOGGLE ===== -->
    <button class="theme-toggle" id="themeToggle" aria-label="Schimbă tema">
        <span class="icon-sun">☀️</span>
        <span class="icon-moon">🌙</span>
    </button>

    <!-- ===== BACK TO TOP ===== -->
    <button class="back-to-top" id="backToTop" aria-label="Înapoi sus">↑</button>

    <!-- ===== JAVASCRIPT DIRECT ===== -->
    <script>
    (function() {
        'use strict';
        
        // ========== THEME TOGGLE ==========
        const btn = document.getElementById('themeToggle');
        if (btn) {
            // Încarcă tema
            let saved = localStorage.getItem('technest-theme');
            if (!saved) {
                saved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            
            function applyTheme(theme) {
                if (theme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                } else {
                    document.documentElement.removeAttribute('data-theme');
                }
                localStorage.setItem('technest-theme', theme);
            }
            
            btn.addEventListener('click', function() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                applyTheme(isDark ? 'light' : 'dark');
            });
            
            applyTheme(saved);
        }
        
        // ========== MOBILE MENU ==========
        const menuToggle = document.getElementById('menuToggle');
        const mainNav = document.getElementById('mainNav');
        const navOverlay = document.getElementById('navOverlay');
        
        if (menuToggle && mainNav && navOverlay) {
            function toggleMenu() {
                const isOpen = mainNav.classList.contains('open');
                menuToggle.classList.toggle('active');
                mainNav.classList.toggle('open');
                navOverlay.classList.toggle('active');
                document.body.style.overflow = isOpen ? '' : 'hidden';
                menuToggle.setAttribute('aria-expanded', !isOpen);
            }
            
            menuToggle.addEventListener('click', toggleMenu);
            navOverlay.addEventListener('click', toggleMenu);
            
            document.querySelectorAll('#mainNav a').forEach(function(link) {
                link.addEventListener('click', function() {
                    if (mainNav.classList.contains('open')) toggleMenu();
                });
            });
        }
        
        // ========== BACK TO TOP ==========
        const backToTop = document.getElementById('backToTop');
        if (backToTop) {
            window.addEventListener('scroll', function() {
                backToTop.classList.toggle('visible', window.pageYOffset > 400);
            });
            backToTop.addEventListener('click', function() {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }
        
        // ========== HEADER SCROLL ==========
        const header = document.getElementById('header');
        if (header) {
            window.addEventListener('scroll', function() {
                header.classList.toggle('scrolled', window.pageYOffset > 50);
            });
        }
        
        // ========== DYNAMIC YEAR ==========
        const yearSpan = document.getElementById('currentYear');
        if (yearSpan) {
            yearSpan.textContent = new Date().getFullYear();
        }
        
        // ========== ACTIVE NAV LINK ==========
        const currentPage = window.location.pathname.split('/').pop() || 'index.html';
        document.querySelectorAll('#mainNav a:not(.btn-nav)').forEach(function(link) {
            const href = link.getAttribute('href');
            if (href === currentPage || (currentPage === '' && href === 'index.html')) {
                link.classList.add('active');
            }
        });
        
        console.log('✅ TechNest PC - Toate funcționalitățile sunt active!');
    })();
    </script>
</body>
</html>
